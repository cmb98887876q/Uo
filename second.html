<!-- ADMIN UPLOAD PANEL FOR BLOGGER -->
<div style="font-family: 'Arial', sans-serif; background: #080a10; padding: 25px; border-radius: 15px; border: 1px solid #2ebd85; max-width: 350px; margin: 20px auto; color: #fff; text-align: center; box-shadow: 0 10px 30px rgba(46, 189, 133, 0.2);">
    <h2 style="margin-top: 0; color: #2ebd85; font-size: 20px;">RupeeFlow Chit Admin</h2>
    <p style="font-size: 12px; color: #8b94a5; margin-bottom: 20px;">Select chit file to trigger 100% payout in App.</p>
    
    <input type="file" id="admin-file" accept="*/*" style="width: 100%; margin-bottom: 20px; color: #fff; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px;">
    
    <button id="admin-upload-btn" style="width: 100%; background: #2ebd85; color: #000; border: none; padding: 12px; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 16px;">Send Signal to App</button>
    <p id="admin-status" style="margin-top: 15px; font-size: 14px; font-weight: bold;"></p>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // App Wala Same Firebase Config
    const configGame = { 
        apiKey: "AIzaSyCpVS-SVaIJI6DN8AqnoYslb1vujw8N1ds", 
        authDomain: "game-cd989.firebaseapp.com", 
        databaseURL: "https://game-cd989-default-rtdb.firebaseio.com", 
        projectId: "game-cd989" 
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(configGame);
    }
    const db = firebase.database();

    document.getElementById('admin-upload-btn').addEventListener('click', () => {
        const fileInput = document.getElementById('admin-file');
        const statusText = document.getElementById('admin-status');
        
        if(fileInput.files.length === 0) {
            statusText.innerText = "Please select a file first!";
            statusText.style.color = "#ff2a5f";
            return;
        }

        const fileName = fileInput.files[0].name.toLowerCase();
        
        // Check Name Validity
        const isValid = fileName.startsWith("text.rupeeflow.chit");

        statusText.innerText = "Sending...";
        statusText.style.color = "#ffd700";

        // Push event to Firebase
        const eventId = "chit_" + Date.now(); // Unique ID to prevent double use
        
        db.ref('rupeeflow/chitSignal').set({
            id: eventId,
            fileName: fileName,
            isValid: isValid,
            timestamp: Date.now()
        }).then(() => {
            statusText.innerText = "Signal Successfully Sent! ✅";
            statusText.style.color = "#2ebd85";
            fileInput.value = ""; // Clear input
        }).catch((err) => {
            statusText.innerText = "Error: " + err.message;
            statusText.style.color = "#ff2a5f";
        });
    });
</script>
