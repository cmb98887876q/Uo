<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Services Hub | Desktop Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap');
        
        :root {
            --accent: #4f46e5;
            --accent-bright: #818cf8;
            --zinc-dark: #09090b;
            --zinc-surface: #ffffff;
            --zinc-border: #e4e4e7;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fafafa;
            color: #18181b;
            overflow-x: hidden;
        }

        .brand-font { font-family: 'Outfit', sans-serif; }

        /* Animated Mesh Background for Desktop */
        .desktop-mesh {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 0% 0%, rgba(79, 70, 229, 0.04) 0px, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(6, 182, 212, 0.04) 0px, transparent 40%);
        }

        /* Glass Floating Nav */
        .glass-header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px) saturate(200%);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* Bento Command Center */
        .bento-hero {
            background: var(--zinc-dark);
            border-radius: 48px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.2);
        }

        .bento-glow {
            position: absolute; top: 0; right: 0;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.15) 0%, transparent 70%);
            filter: blur(60px);
        }

        /* Magnetic Card Styling */
        .resource-card {
            background: var(--zinc-surface);
            border: 1px solid var(--zinc-border);
            border-radius: 32px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
        }

        .resource-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 40px 60px -15px rgba(0, 0, 0, 0.06);
        }

        /* Desktop Spotlight Input */
        .spotlight-input {
            transition: all 0.3s ease;
            box-shadow: 0 0 0 0px rgba(79, 70, 229, 0);
        }

        .spotlight-input:focus {
            box-shadow: 0 0 0 10px rgba(79, 70, 229, 0.05);
            border-color: var(--accent);
        }

        /* Custom Scrollbar for Desktop */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #f4f4f5; }
        ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 20px; border: 3px solid #f4f4f5; }
        ::-webkit-scrollbar-thumb:hover { background: #a1a1aa; }

        /* Animation */
        @keyframes reveal {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .reveal-item { animation: reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    </style>
</head>
<body>

    <div class="desktop-mesh"></div>

    <!-- Desktop Header -->
    <nav class="glass-header sticky top-0 z-[100]">
        <div class="max-w-[1440px] mx-auto px-10 py-5 flex items-center justify-between">
            
            <div class="flex items-center gap-6">
                <img src="https://i.ibb.co/h1wyr15h/7197-removebg-preview.png" alt="Logo" class="h-20 w-auto hover:scale-105 transition-transform duration-500">
                <div class="h-12 w-[1px] bg-zinc-200 hidden md:block"></div>
                <div class="hidden md:flex flex-col">
                    <span class="brand-font text-2xl font-extrabold text-zinc-900 tracking-tight">Portal</span>
                    <span class="text-[10px] font-black uppercase tracking-[0.4em] text-indigo-600">National Hub</span>
                </div>
            </div>
            
            <div class="flex items-center gap-12">
                <div class="hidden lg:flex items-center gap-8 border-r border-zinc-200 pr-12">
                    <div class="text-right">
                        <div id="clock" class="text-4xl font-bold text-zinc-950 tabular-nums tracking-tighter">00:00:00</div>
                        <div id="date" class="text-[11px] text-zinc-400 font-bold uppercase tracking-[0.2em] mt-1">July 2026</div>
                    </div>
                </div>
                
                <a href="admin.html" class="group relative h-14 w-14 rounded-2xl bg-zinc-950 flex items-center justify-center text-white transition-all hover:bg-indigo-600 hover:rotate-6">
                    <i class="fa-solid fa-bolt-lightning text-xl"></i>
                    <span class="absolute -top-10 scale-0 group-hover:scale-100 transition-all bg-zinc-800 text-[10px] px-3 py-1 rounded-lg">Admin</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-[1440px] mx-auto px-10 pt-12 pb-24">
        
        <!-- Desktop Bento Hero -->
        <section class="bento-hero px-12 py-24 text-white mb-20">
            <div class="bento-glow"></div>
            
            <div class="grid lg:grid-cols-2 items-center gap-16 relative z-10">
                <div class="text-left">
                    <div class="inline-flex items-center gap-3 bg-white/5 backdrop-blur-md px-6 py-2.5 rounded-2xl border border-white/10 mb-10">
                        <span class="h-2 w-2 rounded-full bg-cyan-400 animate-pulse shadow-[0_0_10px_#22d3ee]"></span>
                        <span class="text-[10px] font-extrabold tracking-[0.2em] uppercase">Enterprise Cloud Infrastructure</span>
                    </div>

                    <h1 class="brand-font text-6xl xl:text-7xl font-extrabold mb-10 leading-[1.05] tracking-tight">
                        Global Access to <br>
                        <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-cyan-400 to-indigo-500">Public Services</span>
                    </h1>

                    <div class="relative max-w-xl group">
                        <div class="absolute inset-y-0 left-6 flex items-center pointer-events-none">
                            <i class="fa-solid fa-search text-zinc-500 group-focus-within:text-indigo-400"></i>
                        </div>
                        <input 
                            type="text" 
                            id="searchInput"
                            placeholder="Type to search (e.g. Voter ID, PAN, Banking)..." 
                            class="spotlight-input w-full bg-zinc-900/50 backdrop-blur-xl text-white border border-white/10 rounded-2xl pl-16 pr-6 py-6 text-xl outline-none placeholder:text-zinc-600"
                        >
                        <div class="absolute right-6 top-1/2 -translate-y-1/2 hidden md:block">
                            <kbd class="bg-zinc-800 text-zinc-500 px-3 py-1.5 rounded-xl text-[10px] font-bold border border-white/5 uppercase">⌘ K</kbd>
                        </div>
                    </div>
                </div>

                <div class="hidden lg:grid grid-cols-2 gap-6">
                    <div class="p-8 bg-white/5 rounded-[32px] border border-white/5 backdrop-blur-sm">
                        <p class="text-zinc-500 text-[10px] font-bold uppercase mb-4 tracking-widest">Total Resources</p>
                        <div class="text-5xl font-bold" id="stat-total">0</div>
                    </div>
                    <div class="p-8 bg-white/5 rounded-[32px] border border-white/5 backdrop-blur-sm">
                        <p class="text-zinc-500 text-[10px] font-bold uppercase mb-4 tracking-widest">System Health</p>
                        <div class="text-xl font-bold text-cyan-400">99.9% Online</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Main Desktop Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-10" id="resourceGrid">
            <!-- Skeletons -->
            <div class="h-80 bg-zinc-200 rounded-[32px] animate-pulse"></div>
            <div class="h-80 bg-zinc-200 rounded-[32px] animate-pulse"></div>
            <div class="h-80 bg-zinc-200 rounded-[32px] animate-pulse"></div>
            <div class="h-80 bg-zinc-200 rounded-[32px] animate-pulse"></div>
        </div>

    </main>

    <footer class="py-20 border-t border-zinc-200">
        <div class="max-w-[1440px] mx-auto px-10 flex justify-between items-center text-zinc-400">
            <p class="text-xs font-bold uppercase tracking-[0.3em]">© 2026 National Services Hub • Official Directory</p>
            <div class="flex gap-10">
                <i class="fa-solid fa-shield-check"></i>
                <i class="fa-solid fa-lock"></i>
                <i class="fa-solid fa-globe"></i>
            </div>
        </div>
    </footer>

    <!-- Firebase System -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCpVS-SVaIJI6DN8AqnoYslb1vujw8N1ds", 
            authDomain: "game-cd989.firebaseapp.com", 
            databaseURL: "https://game-cd989-default-rtdb.firebaseio.com", 
            projectId: "game-cd989" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const portalsRef = ref(db, 'portals');

        let allPortals = [];

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
            document.getElementById('date').innerText = now.toLocaleDateString('en-GB', { 
                day: 'numeric', month: 'long', year: 'numeric' 
            }).toUpperCase();
        }
        setInterval(updateClock, 1000);
        updateClock();

        onValue(portalsRef, (snapshot) => {
            const data = snapshot.val();
            allPortals = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
            document.getElementById('stat-total').innerText = allPortals.length;
            renderGrid();
        });

        document.getElementById('searchInput').oninput = () => renderGrid();

        function renderGrid() {
            const grid = document.getElementById('resourceGrid');
            const query = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allPortals.filter(p => p.name.toLowerCase().includes(query) || p.category.toLowerCase().includes(query));

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-40 text-center"><h3 class="text-3xl font-bold text-zinc-300">No results found in directory.</h3></div>`;
                return;
            }

            grid.innerHTML = filtered.map((p, index) => {
                let domain = "link";
                try { domain = new URL(p.url.startsWith('http') ? p.url : 'https://' + p.url).hostname; } catch(e) {}
                
                return `
                    <div class="resource-card reveal-item p-10 flex flex-col h-full" style="animation-delay: ${index * 0.1}s">
                        <div class="flex justify-between items-start mb-10">
                            <div class="w-16 h-16 rounded-3xl bg-zinc-50 border border-zinc-100 p-3.5 flex items-center justify-center shadow-sm">
                                <img src="https://www.google.com/s2/favicons?domain=${domain}&sz=128" 
                                     onerror="this.src='https://ui-avatars.com/api/?name=${p.name}&background=4f46e5&color=fff'"
                                     class="w-full h-full object-contain">
                            </div>
                            <span class="text-[10px] font-black uppercase tracking-[0.2em] text-indigo-600 bg-indigo-50 px-4 py-2 rounded-xl">
                                ${p.category}
                            </span>
                        </div>
                        
                        <h3 class="brand-font text-2xl font-bold text-zinc-900 mb-4 leading-none">${p.name}</h3>
                        <p class="text-sm text-zinc-500 line-clamp-3 mb-10 leading-relaxed">${p.desc}</p>
                        
                        <div class="mt-auto">
                            <a href="${p.url.startsWith('http') ? p.url : 'https://' + p.url}" target="_blank" 
                               class="group flex items-center justify-between w-full bg-zinc-950 text-white font-bold py-5 px-8 rounded-2xl text-[11px] uppercase tracking-widest transition-all duration-300 hover:bg-indigo-600 hover:shadow-2xl hover:shadow-indigo-500/30">
                                Launch Resource
                                <i class="fa-solid fa-arrow-right-long transition-transform group-hover:translate-x-3"></i>
                            </a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Shortcut Listener
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });
    </script>
</body>
</html>
