<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Services Portal | Official</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap');
        
        :root {
            --brand-blue: #0052cc;
            --surface: #ffffff;
            --background: #fcfdfe;
            --border: #e2e8f0;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--background);
            color: #1e293b;
            overflow-x: hidden;
        }

        .header-font { font-family: 'Poppins', sans-serif; }

        /* Modern Mesh Background */
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(0, 82, 204, 0.03) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.03) 0px, transparent 50%);
        }

        /* Premium Glass Header */
        .glass-nav {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px) saturate(180%);
            border-bottom: 1px solid rgba(226, 232, 240, 0.5);
        }

        /* Bento Hero */
        .hero-bento {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border-radius: 40px;
            position: relative;
            overflow: hidden;
        }

        .hero-glow {
            position: absolute;
            top: -50%; left: -20%;
            width: 100%; height: 200%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Card Interaction */
        .resource-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .resource-card:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: var(--brand-blue);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.08);
        }

        /* Spring Animation */
        @keyframes springUp {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .animate-spring {
            animation: springUp 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
        }

        /* Custom Scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="mesh-bg"></div>

    <!-- Navigation Bar -->
    <nav class="glass-nav sticky top-0 z-[100] transition-all">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between overflow-x-auto no-scrollbar gap-6">
            
            <div class="flex items-center gap-5 flex-shrink-0">
                <img src="https://i.ibb.co/h1wyr15h/7197-removebg-preview.png" alt="Portal Logo" class="h-16 w-auto drop-shadow-sm">
                <div class="h-10 w-[2px] bg-slate-200 opacity-50"></div>
                <div class="flex flex-col">
                    <span class="header-font text-2xl font-extrabold text-slate-900 tracking-tighter">Services</span>
                    <span class="header-font text-2xl font-extrabold text-blue-600 tracking-tighter -mt-1">Portal</span>
                </div>
            </div>
            
            <div class="flex items-center gap-10 flex-shrink-0">
                <div class="hidden lg:flex flex-col text-right">
                    <div id="clock" class="text-3xl font-bold text-slate-800 tabular-nums tracking-tight">00:00:00</div>
                    <div id="date" class="text-[10px] text-blue-600 font-black uppercase tracking-[0.3em]">Loading Calendar</div>
                </div>
                
                <a href="admin.html" class="h-14 w-14 rounded-2xl bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-blue-600 hover:text-white transition-all duration-500 hover:shadow-lg hover:shadow-blue-500/30">
                    <i class="fa-solid fa-user-gear text-xl"></i>
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">
        
        <!-- Bento Hero Section -->
        <section class="hero-bento px-8 py-16 md:py-24 text-center text-white shadow-2xl mb-20">
            <div class="hero-glow"></div>
            
            <div class="relative z-10">
                <div class="inline-flex items-center gap-3 bg-white/10 backdrop-blur-md px-6 py-2 rounded-full border border-white/10 mb-8 scale-95 hover:scale-100 transition-transform">
                    <span class="relative flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                    </span>
                    <span class="text-[10px] font-bold tracking-widest uppercase">Verified National Network</span>
                </div>

                <h1 class="header-font text-5xl md:text-7xl font-bold mb-8 leading-[1.1] tracking-tight">
                    Smart Access to <br>
                    <span class="bg-gradient-to-r from-blue-400 to-indigo-300 bg-clip-text text-transparent">Public Services</span>
                </h1>

                <!-- Spotlight Search Bar -->
                <div class="relative max-w-2xl mx-auto mt-12 group">
                    <div class="absolute inset-y-0 left-6 flex items-center pointer-events-none">
                        <i class="fa-solid fa-magnifying-glass text-slate-400 group-focus-within:text-blue-400 transition-colors"></i>
                    </div>
                    <input 
                        type="text" 
                        id="searchInput"
                        placeholder="Search Voter ID, Education, Banking..." 
                        class="w-full bg-white text-slate-900 border-none rounded-[24px] pl-16 pr-6 py-6 text-lg outline-none shadow-2xl focus:ring-[10px] focus:ring-blue-500/10 transition-all placeholder:text-slate-400 font-medium"
                    >
                    <div class="absolute right-6 top-1/2 -translate-y-1/2 hidden md:block">
                        <span class="bg-slate-100 text-slate-400 px-3 py-1 rounded-lg text-xs font-bold border border-slate-200">CTRL + K</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Dynamic Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10" id="resourceGrid">
            <!-- Loader Skeletons -->
            <div class="h-80 bg-slate-100 rounded-[28px] animate-pulse"></div>
            <div class="h-80 bg-slate-100 rounded-[28px] animate-pulse"></div>
            <div class="h-80 bg-slate-100 rounded-[28px] animate-pulse"></div>
            <div class="h-80 bg-slate-100 rounded-[28px] animate-pulse"></div>
        </div>

    </main>

    <footer class="py-20 text-center">
        <div class="max-w-7xl mx-auto px-6">
            <div class="h-px w-full bg-slate-200 mb-12 opacity-50"></div>
            <p class="text-slate-400 text-sm font-bold uppercase tracking-widest">Official Government Resource Hub • 2026</p>
        </div>
    </footer>

    <!-- Firebase System -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCpVS-SVaIJI6DN8AqnoYslb1vujw8N1ds", 
            authDomain: "game-cd989.firebaseapp.com", 
            databaseURL: "https://game-cd989-default-rtdb.firebaseio.com", 
            projectId: "game-cd989" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const portalsRef = ref(db, 'portals');

        let allPortals = [];

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
            document.getElementById('date').innerText = now.toLocaleDateString('en-GB', { 
                day: 'numeric', month: 'long', year: 'numeric' 
            }).toUpperCase();
        }
        setInterval(updateClock, 1000);
        updateClock();

        onValue(portalsRef, (snapshot) => {
            const data = snapshot.val();
            allPortals = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
            renderGrid();
        });

        document.getElementById('searchInput').oninput = () => renderGrid();

        function renderGrid() {
            const grid = document.getElementById('resourceGrid');
            const query = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allPortals.filter(p => p.name.toLowerCase().includes(query) || p.category.toLowerCase().includes(query));

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-32 text-center">
                        <div class="text-8xl mb-6 grayscale opacity-20">🔎</div>
                        <h3 class="text-2xl font-bold text-slate-800">No resources matched your search</h3>
                        <p class="text-slate-500 mt-2">Try different keywords or browse all services.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filtered.map((p, index) => {
                let domain = "link";
                try { domain = new URL(p.url.startsWith('http') ? p.url : 'https://' + p.url).hostname; } catch(e) {}
                
                return `
                    <div class="resource-card animate-spring p-8 flex flex-col h-full" style="animation-delay: ${index * 0.08}s">
                        <div class="flex justify-between items-start mb-8">
                            <div class="w-16 h-16 rounded-2xl bg-slate-50 border border-slate-100 p-3 flex items-center justify-center">
                                <img src="https://www.google.com/s2/favicons?domain=${domain}&sz=128" 
                                     onerror="this.src='https://ui-avatars.com/api/?name=${p.name}&background=0052cc&color=fff'"
                                     class="w-full h-full object-contain">
                            </div>
                            <span class="text-[9px] font-black uppercase tracking-widest text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg border border-blue-100">
                                ${p.category}
                            </span>
                        </div>
                        
                        <h3 class="header-font text-xl font-bold text-slate-900 mb-3 leading-tight">${p.name}</h3>
                        <p class="text-sm text-slate-500 line-clamp-3 mb-10 leading-relaxed">${p.desc}</p>
                        
                        <div class="mt-auto">
                            <a href="${p.url.startsWith('http') ? p.url : 'https://' + p.url}" target="_blank" 
                               class="group flex items-center justify-between w-full bg-slate-900 text-white font-bold py-4 px-6 rounded-2xl text-xs transition-all duration-300 hover:bg-blue-600 hover:shadow-xl hover:shadow-blue-500/20">
                                OPEN RESOURCE
                                <i class="fa-solid fa-arrow-right-long transition-transform group-hover:translate-x-2"></i>
                            </a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Global shortcut
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });
    </script>
</body>
</html>
